version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./kb:/app/kb:ro
      - ./src:/app/src
    environment:
      - DATABASE_URL=sqlite:///./data/vaxcheck.db
    command: uvicorn vaxcheck.api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    volumes:
      - ./kb:/app/kb:ro
      - ./data:/app/data
      - ./src:/app/src
      - ./app.py:/app/app.py
