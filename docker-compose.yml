version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./kb:/app/kb:ro
    environment:
      - DATABASE_URL=sqlite:///./data/vaxcheck.db
    command: uvicorn vaxcheck.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    ports: ["80:80"]
    depends_on: [api]
