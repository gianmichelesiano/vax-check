# Catalogo vaccini disponibili in Svizzera (2026)
# Fonte: Calendario vaccinale svizzero 2026 (UFSP/CFV) + infovac.ch
# Mapping: nome commerciale -> antigeni coperti
#
# Convenzioni antigeni:
#   D    = Difterite (full dose)
#   d    = Difterite (dose ridotta, adulti)
#   T    = Tetano
#   Pa   = Pertosse acellulare (full dose)
#   pa   = Pertosse acellulare (dose ridotta)
#   IPV  = Poliomielite inattivata
#   Hib  = Haemophilus influenzae b
#   HBV  = Epatite B
#   HAV  = Epatite A
#   M    = Morbillo
#   O    = Orecchioni (Mumps)
#   R    = Rosolia
#   V    = Varicella (VZV)
#   PCV13/15/20/21 = Pneumococco coniugato (valenza)
#   PPV23 = Pneumococco polisaccaridico
#   MenB = Meningococco B
#   MenACWY = Meningococco ACWY
#   HPV9 = Papillomavirus 9-valente
#   FSME = Encefalite da zecche (TBE)
#   RV   = Rotavirus
#   HZ   = Herpes zoster (subunità adiuvato)
#   Influenza_std / Influenza_HD = stagionale standard / high-dose
#   COVID = SARS-CoV-2
#   RSV_mat = vaccino RSV materno
#   RSV_mAB = anticorpo monoclonale RSV (passivo, non vaccino ma in libretto)

products:

  # ─────── Esavalente lattanti ───────
  - name: "Infanrix hexa"
    aliases: ["Infanrix Hexa", "Hexavac"]
    manufacturer: "GSK"
    antigens: [D, T, Pa, IPV, Hib, HBV]
    age_range: { min_months: 2, max_months: 84 }
    notes: "Esavalente standard per schema 2+1 lattanti"

  - name: "Hexyon"
    aliases: ["Hexacima", "Hexyon"]
    manufacturer: "Sanofi"
    antigens: [D, T, Pa, IPV, Hib, HBV]
    age_range: { min_months: 2, max_months: 84 }

  - name: "Vaxelis"
    manufacturer: "MSD/Sanofi"
    antigens: [D, T, Pa, IPV, Hib, HBV]
    age_range: { min_months: 2, max_months: 84 }

  # ─────── Pentavalente ───────
  - name: "Infanrix-IPV+Hib"
    aliases: ["Pentavac"]
    manufacturer: "GSK"
    antigens: [D, T, Pa, IPV, Hib]
    age_range: { min_months: 2, max_months: 84 }

  # ─────── Tetra/Tri-valente bambini ≥4 anni ───────
  - name: "Infanrix-IPV"
    aliases: ["Tetravac", "Boostrix-IPV pediatrico"]
    manufacturer: "GSK"
    antigens: [D, T, Pa, IPV]
    age_range: { min_years: 4, max_years: 7 }
    notes: "Richiamo 4-7 anni"

  # ─────── Adulti / adolescenti (dose ridotta) ───────
  - name: "Boostrix"
    manufacturer: "GSK"
    antigens: [d, T, pa]
    age_range: { min_years: 4 }
    notes: "Richiami dTpa adulti/adolescenti"

  - name: "Boostrix-Polio"
    aliases: ["Boostrix Polio"]
    manufacturer: "GSK"
    antigens: [d, T, pa, IPV]
    age_range: { min_years: 4 }

  - name: "Adacel"
    manufacturer: "Sanofi"
    antigens: [d, T, pa]
    age_range: { min_years: 4 }

  - name: "Adacel-Polio"
    aliases: ["Adacel Polio"]
    manufacturer: "Sanofi"
    antigens: [d, T, pa, IPV]
    age_range: { min_years: 4 }
    notes: "Frequente per richiamo 4-7 anni e 11-15 anni"

  - name: "Revaxis"
    manufacturer: "Sanofi"
    antigens: [d, T, IPV]
    age_range: { min_years: 6 }
    notes: "dT-IPV senza pertosse, raccomandato per recupero adulti (ma dT puro non disponibile in CH)"

  # ─────── MOR / MORV ───────
  - name: "Priorix"
    manufacturer: "GSK"
    antigens: [M, O, R]
    age_range: { min_months: 9 }

  - name: "MMRVaxPro"
    aliases: ["M-M-RVaxPro"]
    manufacturer: "MSD"
    antigens: [M, O, R]
    age_range: { min_months: 9 }

  - name: "Priorix-Tetra"
    aliases: ["Priorix Tetra"]
    manufacturer: "GSK"
    antigens: [M, O, R, V]
    age_range: { min_months: 9, max_years: 12 }
    notes: "Quadrivalente MORV, preferito dal 2023 per vaccinazione di base"

  - name: "ProQuad"
    manufacturer: "MSD"
    antigens: [M, O, R, V]
    age_range: { min_months: 12, max_years: 12 }

  # ─────── Varicella monovalente ───────
  - name: "Varivax"
    manufacturer: "MSD"
    antigens: [V]
    age_range: { min_months: 12 }

  - name: "Varilrix"
    manufacturer: "GSK"
    antigens: [V]
    age_range: { min_months: 9 }

  # ─────── Pneumococco ───────
  - name: "Prevenar 13"
    aliases: ["Prevenar13", "Prevenar-13", "Prevnar 13"]
    manufacturer: "Pfizer"
    antigens: [PCV13]
    age_range: { min_weeks: 6 }
    notes: "Storicamente usato; opzione equivalente a PCV15 per schema 2+1 lattanti"

  - name: "Vaxneuvance"
    manufacturer: "MSD"
    antigens: [PCV15]
    age_range: { min_weeks: 6 }
    notes: "Omologato 2024; equivalente a PCV13 per schema 2+1"

  - name: "Prevenar 20"
    aliases: ["Prevnar 20", "Apexxnar"]
    manufacturer: "Pfizer"
    antigens: [PCV20]
    age_range: { min_weeks: 6 }
    notes: "Dal 2025 omologato <6 anni MA non per schema 2+1 lattanti senza fattori di rischio"

  - name: "Capvaxive"
    manufacturer: "MSD"
    antigens: [PCV21]
    age_range: { min_years: 18 }
    notes: "Omologato autunno 2025, ≥18 anni, copertura sierotipica adulti"

  - name: "Pneumovax 23"
    aliases: ["Pneumo 23", "PPV23"]
    manufacturer: "MSD"
    antigens: [PPV23]
    age_range: { min_years: 2 }
    notes: "NON più raccomandato dal 2014 in CH"

  # ─────── Meningococco ───────
  - name: "Menveo"
    manufacturer: "GSK"
    antigens: [MenACWY]
    age_range: { min_months: 2 }
    notes: "Unico MCV-ACWY omologato <12 mesi"

  - name: "Menquadfi"
    manufacturer: "Sanofi"
    antigens: [MenACWY]
    age_range: { min_years: 1 }

  - name: "Nimenrix"
    manufacturer: "Pfizer"
    antigens: [MenACWY]
    age_range: { min_weeks: 6 }

  - name: "Bexsero"
    manufacturer: "GSK"
    antigens: [MenB]
    age_range: { min_months: 2, max_years: 24 }
    notes: "4CMenB, omologato 2 mesi - 24 anni"

  # ─────── HPV ───────
  - name: "Gardasil 9"
    aliases: ["Gardasil9", "Silgard 9"]
    manufacturer: "MSD"
    antigens: [HPV9]
    age_range: { min_years: 9 }
    notes: "9-valente: HPV 6,11,16,18,31,33,45,52,58"

  # ─────── FSME / TBE ───────
  - name: "FSME-Immun"
    aliases: ["FSME-Immun CC", "FSME Immun"]
    manufacturer: "Pfizer"
    antigens: [FSME]
    age_range: { min_years: 16 }
    notes: "Adulti"

  - name: "FSME-Immun Junior"
    aliases: ["FSME Immun Junior"]
    manufacturer: "Pfizer"
    antigens: [FSME]
    age_range: { min_years: 1, max_years: 15 }
    notes: "Pediatrico 0.25 ml"

  - name: "Encepur N"
    manufacturer: "Bavarian Nordic"
    antigens: [FSME]
    age_range: { min_years: 12 }

  - name: "Encepur N Kinder"
    manufacturer: "Bavarian Nordic"
    antigens: [FSME]
    age_range: { min_years: 1, max_years: 11 }

  # ─────── Rotavirus ───────
  - name: "Rotarix"
    manufacturer: "GSK"
    antigens: [RV]
    age_range: { min_weeks: 6, max_weeks: 24 }
    notes: "Schema 2 dosi orali"

  - name: "RotaTeq"
    manufacturer: "MSD"
    antigens: [RV]
    age_range: { min_weeks: 6, max_weeks: 32 }
    notes: "Schema 3 dosi orali (non standard CH che raccomanda 2 dosi)"

  # ─────── Epatite A / B / combinato ───────
  - name: "Havrix"
    manufacturer: "GSK"
    antigens: [HAV]
    age_range: { min_years: 1 }

  - name: "Vaqta"
    manufacturer: "MSD"
    antigens: [HAV]
    age_range: { min_years: 1 }

  - name: "Engerix-B"
    manufacturer: "GSK"
    antigens: [HBV]
    age_range: { min_months: 0 }

  - name: "HBVaxPro"
    manufacturer: "MSD"
    antigens: [HBV]
    age_range: { min_months: 0 }

  - name: "Twinrix"
    aliases: ["Twinrix Adulti", "Twinrix Pediatrico"]
    manufacturer: "GSK"
    antigens: [HAV, HBV]
    age_range: { min_years: 1 }

  # ─────── Herpes zoster ───────
  - name: "Shingrix"
    manufacturer: "GSK"
    antigens: [HZ]
    age_range: { min_years: 18 }
    notes: "Subunità adiuvato, 2 dosi 0-2 mesi"

  - name: "Zostavax"
    manufacturer: "MSD"
    antigens: [HZ_live]
    age_range: { min_years: 50 }
    notes: "Vaccino vivo, NON più raccomandato; sostituito da Shingrix"

  # ─────── Influenza ───────
  - name: "Influvac Tetra"
    manufacturer: "Viatris"
    antigens: [Influenza_std]
    age_range: { min_months: 6 }

  - name: "Vaxigrip Tetra"
    manufacturer: "Sanofi"
    antigens: [Influenza_std]
    age_range: { min_months: 6 }

  - name: "Efluelda"
    aliases: ["Fluzone High-Dose"]
    manufacturer: "Sanofi"
    antigens: [Influenza_HD]
    age_range: { min_years: 60 }
    notes: "Alto dosaggio, preferito ≥75 anni e ≥65 con fattori di rischio"

  # ─────── COVID-19 ───────
  - name: "Comirnaty"
    aliases: ["Comirnaty Omicron", "Comirnaty JN.1", "Comirnaty LP.8.1"]
    manufacturer: "Pfizer/BioNTech"
    antigens: [COVID]
    age_range: { min_months: 6 }
    notes: "mRNA, formulazione adattata alle varianti"

  - name: "Spikevax"
    manufacturer: "Moderna"
    antigens: [COVID]
    age_range: { min_months: 6 }

  # ─────── RSV ───────
  - name: "Abrysvo"
    manufacturer: "Pfizer"
    antigens: [RSV_mat]
    age_range: { min_years: 18, max_years: 50 }
    notes: "Vaccino RSV per donne in gravidanza 32+0 - 36+0 SG"

  - name: "Beyfortus"
    aliases: ["Nirsevimab"]
    manufacturer: "Sanofi/AstraZeneca"
    antigens: [RSV_mAB]
    age_range: { min_months: 0, max_months: 24 }
    notes: "Anticorpo monoclonale, NON vaccino. Immunizzazione passiva neonati/lattanti"

  # ─────── Rabbia ───────
  - name: "Rabipur"
    manufacturer: "Bavarian Nordic"
    antigens: [Rabies]
    age_range: { min_months: 0 }

  - name: "Verorab"
    manufacturer: "Sanofi"
    antigens: [Rabies]
    age_range: { min_months: 0 }

# ─────── Equivalenze antigene → vaccinazione raccomandata ───────
# Usato dal rule engine: se record contiene questi antigeni, conta per la regola.
antigen_equivalences:
  DTP_pediatric: [D, T, Pa]      # Schema base lattanti
  DTP_adult: [d, T, pa]          # Richiami adulti
  DTP_any: [D, T, Pa, d, pa]
  MOR: [M, O, R]
  MORV: [M, O, R, V]
  PCV_higher_valence: [PCV15, PCV20, PCV21]  # Per persone già vaccinate con PCV13
  Influenza_any: [Influenza_std, Influenza_HD]

# ─────── Note speciali per il rule engine ───────
deprecated_products:
  - name: "Triviraten"
    reason: "Ceppo Rubini orecchioni inefficace; vaccinazioni con questo prodotto vanno ripetute"
  - name: "Pneumovax 23"
    reason: "PPV23 non più raccomandato dal 2014; richiede dose recupero con PCV a valenza superiore"
  - name: "Zostavax"
    reason: "Vaccino vivo sostituito da Shingrix dal 2022"

# ─────── Schemi vaccinali storici (per non flaggare come errori) ───────
historical_schemas:
  DTPa_3plus1:
    description: "Schema 3+1 in uso fino al 2018: dosi a 2-4-6-15/24 mesi"
    valid_until_birth_year: 2018
    counts_as_complete: true
    total_doses_expected: 4
  DTPa_2plus1:
    description: "Schema 2+1 raccomandato dal 2019: dosi a 2-4-12 mesi"
    valid_from_birth_year: 2019
    counts_as_complete: true
    total_doses_expected: 3
